<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Link Shortener</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f5f5f5;
      color: #222;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .container {
      width: 100%;
      max-width: 560px;
    }

    h1 {
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 2rem;
      text-align: center;
    }

    .card {
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      padding: 1.5rem;
      margin-bottom: 1.5rem;
    }

    h2 {
      font-size: 1.1rem;
      font-weight: 600;
      margin-bottom: 1rem;
      color: #444;
    }

    .input-row {
      display: flex;
      gap: 0.5rem;
    }

    input[type="text"] {
      flex: 1;
      padding: 0.6rem 0.8rem;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.15s;
    }

    input[type="text"]:focus { border-color: #4a90e2; }

    button {
      padding: 0.6rem 1.2rem;
      background: #4a90e2;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 0.95rem;
      cursor: pointer;
      transition: background 0.15s;
      white-space: nowrap;
    }

    button:hover { background: #357abd; }

    .result {
      margin-top: 1rem;
      padding: 0.75rem;
      border-radius: 6px;
      font-size: 0.9rem;
    }

    .result.success {
      background: #eaf4ea;
      border: 1px solid #b2d8b2;
      color: #2d6a2d;
    }

    .result.error {
      background: #fdecea;
      border: 1px solid #f0b8b0;
      color: #9b2020;
    }

    .result a { color: inherit; font-weight: 600; word-break: break-all; }

    .stats-grid {
      display: grid;
      grid-template-columns: max-content 1fr;
      gap: 0.3rem 1rem;
    }

    .stats-label { color: #666; font-size: 0.85rem; }
    .stats-value { font-size: 0.85rem; word-break: break-all; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Link Shortener</h1>

    <!-- Shorten form -->
    <div class="card">
      <h2>Shorten a URL</h2>
      <div class="input-row">
        <input type="text" id="longUrl" placeholder="https://example.com/very/long/url" />
        <button onclick="shortenUrl()">Shorten</button>
      </div>
      <div id="shortenResult" class="result" style="display:none"></div>
    </div>

    <!-- Stats form -->
    <div class="card">
      <h2>Look up stats</h2>
      <div class="input-row">
        <input type="text" id="shortCode" placeholder="abc123" />
        <button onclick="lookupStats()">Get Stats</button>
      </div>
      <div id="statsResult" class="result" style="display:none"></div>
    </div>
  </div>

  <script>
    async function shortenUrl() {
      const input = document.getElementById('longUrl');
      const result = document.getElementById('shortenResult');
      const url = input.value.trim();

      result.style.display = 'none';
      if (!url) return;

      try {
        const res = await fetch('/shorten', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ url }),
        });
        const data = await res.json();

        if (res.ok) {
          result.className = 'result success';
          result.innerHTML = `Short URL: <a href="${data.short_url}" target="_blank">${data.short_url}</a><br><small>Code: ${data.short_code}</small>`;
        } else {
          result.className = 'result error';
          const msg = data.detail || 'Unknown error';
          result.textContent = `Error: ${Array.isArray(msg) ? msg.map(e => e.msg).join(', ') : msg}`;
        }
      } catch (e) {
        result.className = 'result error';
        result.textContent = `Network error: ${e.message}`;
      }
      result.style.display = 'block';
    }

    async function lookupStats() {
      const input = document.getElementById('shortCode');
      const result = document.getElementById('statsResult');
      const code = input.value.trim();

      result.style.display = 'none';
      if (!code) return;

      try {
        const res = await fetch(`/stats/${encodeURIComponent(code)}`);
        const data = await res.json();

        if (res.ok) {
          result.className = 'result success';
          result.innerHTML = `<div class="stats-grid">
            <span class="stats-label">Original URL</span><span class="stats-value">${escHtml(data.original_url)}</span>
            <span class="stats-label">Short code</span><span class="stats-value">${escHtml(data.short_code)}</span>
            <span class="stats-label">Clicks</span><span class="stats-value">${data.click_count}</span>
            <span class="stats-label">Created</span><span class="stats-value">${new Date(data.created_at).toLocaleString()}</span>
          </div>`;
        } else {
          result.className = 'result error';
          result.textContent = `Error: ${data.detail || 'Not found'}`;
        }
      } catch (e) {
        result.className = 'result error';
        result.textContent = `Network error: ${e.message}`;
      }
      result.style.display = 'block';
    }

    function escHtml(str) {
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    // Allow Enter key to submit
    document.getElementById('longUrl').addEventListener('keydown', e => { if (e.key === 'Enter') shortenUrl(); });
    document.getElementById('shortCode').addEventListener('keydown', e => { if (e.key === 'Enter') lookupStats(); });
  </script>
</body>
</html>
